<script type="module">
    import { supabase } from './js/supabase.js';
    
    // Verificação de sessão persistente ao carregar
    (async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            window.location.href = "descobrir.html";
        }
    })();

    // Animação de entrada fluida (Cyber-Noir)
    gsap.from("main", {
        y: 40,
        opacity: 0,
        duration: 1,
        ease: "power4.out"
    });

    const form = document.getElementById('register-form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = form.querySelector('button[type="submit"]');
        const btnText = btn.innerHTML;

        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Aguarde...';
        btn.disabled = true;

        const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: {
                data: { nome: name, avatar_url: '' }
            }
        });

        if (error) {
            alert('Erro ao criar conta: ' + error.message);
            btn.innerHTML = btnText;
            btn.disabled = false;
        } else {
            // Sucesso!
            window.location.href = 'primeiroLogin.html';
        }
    });
</script>
