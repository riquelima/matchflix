<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MatchFlix - Filtros</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#e50914",
              "surface": "#131313",
              "surface-container": "#201f1f",
              "surface-container-low": "#1c1b1b",
              "surface-container-high": "#2a2a2a",
              "surface-container-highest": "#353534",
              "on-surface": "#e5e2e1",
              "on-surface-variant": "#e9bcb6",
              "tertiary": "#fabd00",
              "outline-variant": "#5e3f3b",
              "surface-container-lowest": "#0e0e0e",
            }
          }
        }
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
        .nav-item {
            color: #737373;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 24px;
            padding: 8px 16px;
        }
        .nav-item.active {
            color: #e50914;
            background: rgba(229, 9, 20, 0.15);
        }
        body {
            min-height: max(884px, 100dvh);
        }
        /* Genre Toggle Style */
        .genre-btn.active {
            background: linear-gradient(to bottom right, #e50914, #ff5e62);
            color: white;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
            border-color: transparent;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body min-h-screen pb-32">
    
    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 shadow-none duration-200">
        <div class="bg-gradient-to-b from-black/80 to-transparent absolute inset-0 -z-10 pointer-events-none h-32"></div>
        <div class="flex items-center justify-between px-6 py-4 w-full bg-transparent backdrop-blur-xl border-b border-white/5">
            <button onclick="history.back()" class="text-zinc-400 hover:bg-white/5 transition-colors p-2 rounded-full flex items-center justify-center">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="font-headline font-bold tracking-tight text-2xl text-on-surface">Filtros Inteligentes</h1>
            <button id="reset-filters" class="text-zinc-400 hover:bg-white/5 transition-colors p-2 rounded-full flex items-center justify-center">
                <span class="material-symbols-outlined">restart_alt</span>
            </button>
        </div>
    </header>

    <main class="pt-24 px-6 max-w-md mx-auto space-y-12 pb-20">
        
        <!-- Section: Filtros de Streaming -->
        <section class="space-y-6">
            <h2 class="font-headline text-xl font-bold text-on-surface tracking-tight">Filtros de Streaming</h2>
            <div id="streaming-grid" class="grid grid-cols-4 sm:grid-cols-5 gap-3">
                <!-- Streaming logos will be injected via JS -->
            </div>
        </section>

        <!-- Section: Filtros do Filme -->
        <section class="space-y-6">
            <h2 class="font-headline text-xl font-bold text-on-surface tracking-tight">Filtros do Filme</h2>
            <div class="space-y-4">
                <div>
                    <h3 class="font-label text-sm text-on-surface-variant mb-3">Gênero</h3>
                    <div id="genres-grid" class="flex flex-wrap gap-2">
                        <!-- Genres will be injected via JS -->
                    </div>
                </div>

                <div>
                    <h3 class="font-label text-sm text-on-surface-variant mb-3">Ano/Época</h3>
                    <div class="flex gap-2">
                        <button class="year-btn flex-1 py-3 rounded-xl bg-surface-container-high text-on-surface-variant font-label text-sm hover:bg-surface-variant transition-colors border border-outline-variant/15 flex items-center justify-center gap-2" data-year="2024">
                            <span class="material-symbols-outlined text-[18px]">new_releases</span>
                            Recentes
                        </button>
                        <button class="year-btn flex-1 py-3 rounded-xl bg-surface-container-high text-on-surface-variant font-label text-sm hover:bg-surface-variant transition-colors border border-outline-variant/15 flex items-center justify-center gap-2" data-year="all">
                            <span class="material-symbols-outlined text-[18px]">movie</span>
                            Todos
                        </button>
                    </div>
                </div>

                <div>
                    <h3 class="font-label text-sm text-on-surface-variant mb-3">Duração</h3>
                    <div class="flex gap-2 bg-surface-container-highest p-1 rounded-full">
                        <button class="flex-1 py-2 rounded-full text-on-surface-variant font-label text-sm">Curtos</button>
                        <button class="flex-1 py-2 rounded-full bg-surface-container text-on-surface font-label text-sm shadow-md">Médio</button>
                        <button class="flex-1 py-2 rounded-full text-on-surface-variant font-label text-sm">Longos</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section: Filtros do Usuário -->
        <section class="space-y-6">
            <h2 class="font-headline text-xl font-bold text-on-surface tracking-tight">Filtros do Usuário</h2>
            <div class="space-y-6">
                <label class="flex items-center justify-between group cursor-pointer bg-surface-container-high p-4 rounded-xl border border-outline-variant/15">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center text-tertiary">
                            <span class="material-symbols-outlined filled">thumb_up</span>
                        </div>
                        <span class="font-label text-on-surface">Baseado nos seus likes</span>
                    </div>
                    <div class="relative inline-flex items-center">
                        <input type="checkbox" id="filter-likes" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-surface-container-highest rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gradient-to-br peer-checked:from-primary-container peer-checked:to-red-600 shadow-[0_0_15px_rgba(229,9,20,0.3)]"></div>
                    </div>
                </label>

                <div>
                    <h3 class="font-label text-sm text-on-surface-variant mb-3 flex justify-between">
                        <span>Nota mínima</span>
                        <span id="rating-display" class="text-tertiary font-black">7+</span>
                    </h3>
                    <div class="px-2">
                        <input type="range" id="filter-rating-slider" class="w-full h-2 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-tertiary" min="6" max="9" step="1" value="7">
                        <div class="flex justify-between text-[10px] font-black font-label text-on-surface-variant mt-3 px-1">
                            <span class="rating-label" data-value="6">6+</span>
                            <span class="rating-label" data-value="7">7+</span>
                            <span class="rating-label" data-value="8">8+</span>
                            <span class="rating-label" data-value="9">9+</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="pt-8">
            <button id="apply-filters" class="w-full py-4 rounded-full bg-gradient-to-br from-primary-container to-red-600 text-white font-headline font-bold text-lg shadow-[0_0_30px_rgba(229,9,20,0.3)] hover:shadow-[0_0_40px_rgba(229,9,20,0.5)] transition-all active:scale-95">
                Aplicar Filtros
            </button>
        </div>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-[400px] z-[250] flex justify-around items-center px-2 py-2 bg-neutral-900/60 backdrop-blur-3xl rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/5">
        <button class="nav-item active flex flex-col items-center justify-center" onclick="window.location.href='descobrir.html'">
            <span class="material-symbols-outlined text-xl filled">style</span>
            <span class="font-headline text-[9px] font-bold uppercase tracking-widest mt-1">Match</span>
        </button>
        <button class="nav-item flex flex-col items-center justify-center" onclick="window.location.href='meusmatches.html'">
            <span class="material-symbols-outlined text-xl">favorite</span>
            <span class="font-headline text-[9px] font-bold uppercase tracking-widest mt-1">Likes</span>
        </button>
        <button class="nav-item flex flex-col items-center justify-center" onclick="window.location.href='colecoes.html'">
            <span class="material-symbols-outlined text-xl">movie</span>
            <span class="font-headline text-[9px] font-bold uppercase tracking-widest mt-1">Coleção</span>
        </button>
    </nav>

    <script type="module">
        import { supabase } from './js/supabase.js';

        const API_KEY = "416394469462693ee5727abe4c864848";
        const IMAGE_BASE_URL = "https://image.tmdb.org/t/p/original";
        
        const genresList = [
            { id: 28, name: 'Ação' },
            { id: 35, name: 'Comédia' },
            { id: 27, name: 'Terror' },
            { id: 10749, name: 'Romance' },
            { id: 878, name: 'Ficção' },
            { id: 18, name: 'Drama' },
            { id: 16, name: 'Animação' }
        ];

        let selectedGenres = new Set();
        let selectedProviders = new Set();
        let selectedYear = 'all';
        let currentUser = null;

        async function init() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                currentUser = user;

                let filters = null;
                if (currentUser) {
                    const { data } = await supabase
                        .from('user_filters')
                        .select('filters')
                        .eq('user_id', currentUser.id)
                        .maybeSingle();
                    if (data) filters = data.filters;
                }

                if (!filters) {
                    const saved = localStorage.getItem('mf_filters');
                    if (saved) filters = JSON.parse(saved);
                }

                if (filters) {
                    const val = filters.minRating || 7;
                    document.getElementById('filter-rating-slider').value = val;
                    updateRatingDisplay(val);
                    selectedGenres = new Set(filters.genres || []);
                    selectedProviders = new Set(filters.providers || []);
                    selectedYear = filters.year || 'all';
                } else {
                    updateRatingDisplay(7);
                }
            } catch (err) {
                console.error("Erro no init:", err);
                updateRatingDisplay(7);
            }

            await fetchStreamingProviders();
            renderGenres();
            updateYearButtons();
        }

        async function fetchStreamingProviders() {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/watch/providers/movie?api_key=${API_KEY}&language=pt-BR&watch_region=BR`);
                const data = await res.json();
                
                const topProvidersIds = [8, 119, 337, 1899, 307, 350, 531, 619, 47, 2]; 
                const providers = data.results.filter(p => topProvidersIds.includes(p.provider_id));
                
                const grid = document.getElementById('streaming-grid');
                grid.innerHTML = '';
                
                providers.sort((a, b) => topProvidersIds.indexOf(a.provider_id) - topProvidersIds.indexOf(b.provider_id));

                providers.forEach(provider => {
                    const isActive = selectedProviders.has(provider.provider_id);
                    const container = document.createElement('div');
                    container.className = `provider-card relative cursor-pointer transition-all duration-300 active:scale-90 ${isActive ? 'scale-110' : 'opacity-40 grayscale'}`;
                    container.innerHTML = `
                        <div class="aspect-square rounded-2xl overflow-hidden border-2 ${isActive ? 'border-primary-container shadow-[0_0_15px_rgba(229,9,20,0.5)]' : 'border-white/10'}">
                            <img src="${IMAGE_BASE_URL}${provider.logo_path}" alt="${provider.provider_name}" class="w-full h-full object-cover">
                        </div>
                        ${isActive ? '<div class="absolute -top-1 -right-1 bg-primary-container text-white rounded-full p-0.5 shadow-lg"><span class="material-symbols-outlined text-[14px] font-bold">check</span></div>' : ''}
                    `;
                    container.onclick = () => {
                        if (selectedProviders.has(provider.provider_id)) {
                            selectedProviders.delete(provider.provider_id);
                        } else {
                            selectedProviders.add(provider.provider_id);
                        }
                        fetchStreamingProviders();
                    };
                    grid.appendChild(container);
                });
            } catch (err) {
                console.error("Erro ao buscar providers:", err);
            }
        }

        function updateRatingDisplay(val) {
            const display = document.getElementById('rating-display');
            if(display) display.innerText = val + '+';
            
            document.querySelectorAll('.rating-label').forEach(label => {
                if (label.dataset.value == val) {
                    label.classList.add('text-tertiary', 'scale-110');
                    label.classList.remove('text-on-surface-variant');
                } else {
                    label.classList.remove('text-tertiary', 'scale-110');
                    label.classList.add('text-on-surface-variant');
                }
            });
        }

        document.getElementById('filter-rating-slider').oninput = (e) => {
            updateRatingDisplay(e.target.value);
        };

        function renderGenres() {
            const grid = document.getElementById('genres-grid');
            grid.innerHTML = '';
            genresList.forEach(genre => {
                const isActive = selectedGenres.has(genre.id);
                const btn = document.createElement('button');
                btn.className = `genre-btn px-4 py-2 rounded-full font-label text-sm transition-all border ${
                    isActive 
                    ? 'active' 
                    : 'bg-surface-container-high text-on-surface-variant hover:bg-surface-variant border-outline-variant/15'
                }`;
                btn.innerText = genre.name;
                btn.onclick = () => {
                    if (selectedGenres.has(genre.id)) selectedGenres.delete(genre.id);
                    else selectedGenres.add(genre.id);
                    renderGenres();
                };
                grid.appendChild(btn);
            });
        }

        function updateYearButtons() {
            document.querySelectorAll('.year-btn').forEach(btn => {
                if (btn.dataset.year === selectedYear) {
                    btn.classList.add('bg-primary-container', 'text-white', 'border-transparent');
                    btn.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
                } else {
                    btn.classList.remove('bg-primary-container', 'text-white', 'border-transparent');
                    btn.classList.add('bg-surface-container-high', 'text-on-surface-variant');
                }
            });
        }

        document.querySelectorAll('.year-btn').forEach(btn => {
            btn.onclick = () => {
                selectedYear = btn.dataset.year;
                updateYearButtons();
            };
        });

        document.getElementById('apply-filters').onclick = async () => {
            const filters = {
                minRating: parseInt(document.getElementById('filter-rating-slider').value),
                genres: Array.from(selectedGenres),
                providers: Array.from(selectedProviders),
                year: selectedYear,
                highRating: parseInt(document.getElementById('filter-rating-slider').value) >= 8
            };

            localStorage.setItem('mf_filters', JSON.stringify(filters));

            if (currentUser) {
                try {
                    await supabase.from('user_filters').upsert({
                        user_id: currentUser.id,
                        filters: filters,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'user_id' });
                } catch (err) {
                    console.error("Erro no Supabase:", err);
                }
            }
            
            const btn = document.getElementById('apply-filters');
            btn.innerText = 'Preferências Salvas! ✨';
            btn.classList.replace('from-primary-container', 'from-green-600');
            
            setTimeout(() => { window.location.href = 'descobrir.html'; }, 800);
        };

        document.getElementById('reset-filters').onclick = async () => {
            selectedGenres.clear();
            selectedProviders.clear();
            selectedYear = 'all';
            document.getElementById('filter-rating-slider').value = 7;
            updateRatingDisplay(7);
            
            if (currentUser) {
                await supabase.from('user_filters').delete().eq('user_id', currentUser.id);
            }
            localStorage.removeItem('mf_filters');

            await fetchStreamingProviders();
            renderGenres();
            updateYearButtons();
        };

        init();
    </script>
</body>
</html>
